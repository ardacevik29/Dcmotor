        // --- AI INTEGRATION (GEMINI API) ---
        async function callGeminiAPI(question, contextTitle, contextText) {
            const apiKey = ""; // Provided by execution environment runtime
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const systemPrompt = `Sen bir Elektronik ve Donanım Mühendisliği hocası/uzmanısın. Kullanıcı bir DC Motor Kontrol projesi (analog döngü + dijital frekans sayıcı display) üzerinde çalışıyor. 
Şu an incelediği donanım bloğu: ${contextTitle}. 
Bu bloğun özellikleri: ${contextText}.
Kullanıcının sorusuna, entegrelerin (LM324, CD4026, LM2917, NE555 vb.) pin yapılarını veya teorisini göz önünde bulundurarak teknik, eğitici ve Türkçe bir yanıt ver. Formatlama için sade markdown kullanabilirsin, gereksiz uzatma.`;

            const payload = {
                contents: [{ parts: [{ text: question }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            let delay = 1000;
            const retries = 5;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP Hata: ${response.status}`);
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Gemini'den boş yanıt döndü.";
                } catch (error) {
                    if (i === retries - 1) return `Yapay zeka asistanına şu an ulaşılamıyor (Hata: ${error.message}). Lütfen daha sonra tekrar deneyin.`;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

                    <div>
                        <h4 class="text-sm font-bold text-purple-900">Mühendislik Asistanı</h4>
                        <p class="text-[10px] text-purple-600">Bu bölüm (${sectionData.title}) hakkında soru sorun</p>
                    </div>
                </div>
                <div id="ai-chat-history" class="p-4 max-h-60 overflow-y-auto bg-slate-50 text-sm space-y-4">
                    <div class="flex items-start">
                        <div class="bg-purple-100 text-purple-800 rounded-lg p-3 rounded-tl-none max-w-[85%]">
                            Merhaba! Bu donanım katındaki konfigürasyonlar, formüller veya kullanılacak entegrelerin veri sayfaları (datasheet) hakkında yardıma ihtiyacınız var mı?
                        </div>
                    </div>
                </div>
                <div class="p-3 bg-white border-t border-slate-100 flex items-center">
                    <input type="text" id="ai-input" placeholder="Örn: Bu entegrenin bağlantıları nasıldır?" class="flex-1 bg-slate-50 border border-slate-200 text-sm rounded-l-lg px-4 py-2 focus:outline-none focus:border-purple-400 focus:ring-1 focus:ring-purple-400 transition">
                    <button id="ai-send-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-r-lg transition flex items-center justify-center min-w-[50px]">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            `;
            
            containerElement.appendChild(aiContainer);

            const inputField = document.getElementById('ai-input');
            const sendBtn = document.getElementById('ai-send-btn');
            const chatHistory = document.getElementById('ai-chat-history');

            const sendMessage = async () => {
                const text = inputField.value.trim();
                if(!text) return;

                // User Message
                chatHistory.innerHTML += `
                    <div class="flex items-start justify-end">
                        <div class="bg-blue-600 text-white rounded-lg p-3 rounded-tr-none max-w-[85%] ml-auto">
                            ${text}
                        </div>
                    </div>
                `;
                inputField.value = '';
                chatHistory.scrollTop = chatHistory.scrollHeight;

                // Loading Indicator
                const loadingId = 'loading-' + Date.now();
                chatHistory.innerHTML += `
                    <div id="${loadingId}" class="flex items-start">
                        <div class="bg-purple-100 text-purple-800 rounded-lg p-3 rounded-tl-none max-w-[85%] typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                `;
                chatHistory.scrollTop = chatHistory.scrollHeight;

                // Set button state
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                // Call API
                const contextStr = `${sectionData.q1_text} ${sectionData.q2_text} ${sectionData.q3_text}`;
                let responseText = await callGeminiAPI(text, sectionData.title, contextStr);
                
                // Basic markdown parsing for bold and line breaks
                responseText = responseText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                responseText = responseText.replace(/\n/g, '<br>');

                // Remove loading and append result
                document.getElementById(loadingId).remove();
                chatHistory.innerHTML += `
                    <div class="flex items-start">
                        <div class="bg-purple-100 text-purple-800 rounded-lg p-3 rounded-tl-none max-w-[85%] leading-relaxed">
                            ${responseText}
                        </div>
                    </div>
                `;
                chatHistory.scrollTop = chatHistory.scrollHeight;
                
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            };

            sendBtn.addEventListener('click', sendMessage);
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }

        // --- LOAD CONTENT VIEWS ---
        function loadOverview() {
            currentSectionId = 'overview';
            updateNavState('overview');
            sectionTitle.innerText = projectData.overview.title;
            contentContainer.innerHTML = `<div class="fade-in max-w-5xl">${projectData.overview.content}</div>`;
            renderChart();
        }

        function loadSection(id) {
            currentSectionId = id;
            updateNavState(id);
            const data = projectData.sections.find(s => s.id === id);
            sectionTitle.innerText = data.title;
            
            const html = `
                <div class="fade-in max-w-4xl pb-10" id="section-content-area">
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8 rounded-r-lg">
                        <p class="text-blue-800"><i class="fas fa-info-circle mr-2"></i>${data.desc}</p>
                    </div>

                    <div class="space-y-6">
                        <!-- Q1 -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition">
                            <div class="flex items-start">
                                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold mr-4 flex-shrink-0">1</div>
                                <div>
                                    <h4 class="text-lg font-bold text-slate-800 mb-2">${data.q1_title}</h4>
                                    <p class="text-slate-600 leading-relaxed">${data.q1_text}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Q2 -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition">
                            <div class="flex items-start">
                                <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500 font-bold mr-4 flex-shrink-0"><i class="fas fa-microchip"></i></div>
                                <div>
                                    <h4 class="text-lg font-bold text-slate-800 mb-2">${data.q2_title}</h4>
                                    <p class="text-slate-600 leading-relaxed">${data.q2_text}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Q3 -->
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition">
                            <div class="flex items-start">
                                <div class="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center text-teal-500 font-bold mr-4 flex-shrink-0"><i class="fas fa-cogs"></i></div>
                                <div>
                                    <h4 class="text-lg font-bold text-slate-800 mb-2">${data.q3_title}</h4>
                                    <p class="text-slate-600 leading-relaxed">${data.q3_text}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            contentContainer.innerHTML = html;

            // Render AI Chatbox at the bottom of the section
            const sectionContentArea = document.getElementById('section-content-area');
            renderAIChatbox(sectionContentArea, data);
        }

        // --- CHART GENERATION ---
        function renderChart() {
            const ctx = document.getElementById('systemResponseChart');
            if(!ctx) return;

            if (currentChart) {
                currentChart.destroy();
            }

            // Kapalı çevrim motor hızlanma eğrisi simülasyon verisi (Aşım ve oturma süresi)
            const timeLabels = Array.from({length: 30}, (_, i) => i * 0.1);
            const referenceData = Array(30).fill(100); // Hedef Hız (RPM %)
            const actualSpeedData = timeLabels.map(t => {
                if (t < 0.2) return 0;
                // Sönümlü osilasyon formülü (Underdamped response)
                return 100 * (1 - Math.exp(-2*t) * Math.cos(5*t)); 
            });

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeLabels.map(l => l.toFixed(1) + 's'),
                    datasets: [
                        {
                            label: 'Hedeflenen Hız (Referans Voltajı)',
                            data: referenceData,
                            borderColor: '#94a3b8',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            fill: false,
                            tension: 0
                        },
                        {
                            label: 'Gerçekleşen Motor Hızı (Analog Geri Besleme)',
                            data: actualSpeedData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 3,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6 } },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 140,
                            title: { display: true, text: 'Hız / Voltaj (%)', font: {size: 11} }
                        },
                        x: {
                            title: { display: true, text: 'Zaman (s)', font: {size: 11} },
                            grid: { display: false }
                        }
                    },
                    interaction: { mode: 'nearest', axis: 'x', intersect: false }
                }
            });
        }

        // Bootstrap
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
